<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruturaj Deshmukh | Home</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Modern Premium Glowing Background -->
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>
    <div class="bg-glow glow-3"></div>

    <div class="nav-overlay" id="nav-overlay"></div>
    <nav>
        <a href="index.html" class="brand">Ruturaj.</a>
        <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
        <div class="nav-links" id="nav-links">
            <a href="index.html" class="nav-item">Home</a>
            <a href="about.html" class="nav-item">About</a>
            <a href="skills.html" class="nav-item">Skills</a>
            <a href="projects.html" class="nav-item">Projects</a>
            <a href="contact.html" class="nav-item">Contact</a>

            <label class="ios-switch">
                <input type="checkbox" id="theme-toggle">

        </div>

    <div class="container">
        <section class="hero">
            <div class="hero-text">

                </h2>
                <p class="animate-up delay-3">Passionate about creating innovative solutions and currently pursuing my MCA. I specialize in backend

                <div class="hero-cta animate-up delay-4" style="display: flex; gap: 20px; margin-top: 30px;">
                    <a href="projects.html" class="btn">View My Work</a>
                    <a href="contact.html" class="btn outline">Contact Me</a>
                </div>
            </div>

            <div class="hero-image-wrap animate-up delay-2">
                <img src="ruturaj.jpg.jpeg" class="hero-image" alt="Ruturaj Deshmukh"
                    onerror="this.src='https://via.placeholder.com/320x400?text=Ruturaj+Deshmukh'">

        </section>
    </div>

    <script src="script.js"></script>
